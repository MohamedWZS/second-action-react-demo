name: Test Project
on: [push, workflow_dispatch] # Using multiple Triggers
jobs:
  test:
    runs-on: ubuntu-latest # Environment (Hint: Environments don't have access to your code automatically, you will have to specify it to it in a step.)
    steps:
      - name: Get code
        uses: actions/checkout@v3 # action (You specify the action using "uses:" followed by the name of the action from the actoin marketplace.)
      - name: Install NodeJs
        uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: Install dependencies
        run:  npm ci
      - name: Run tests
        run: npm test
  deploy:
    needs: test
    runs-on: ubuntu-latest 
    steps:
      - name: Get code
        uses: actions/checkout@v3 
      - name: Install NodeJs
        uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: Install dependencies
        run:  npm ci
      - name: Run tests
        run: npm test
      - name: Build project
        run: npm run build
      - name: Deploy
        run: echo "Deploying ..."
        
